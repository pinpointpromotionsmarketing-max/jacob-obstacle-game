                ],
                goal: { x: 720, y: 10 }
            },
            {
                name: 'Level 6: Tighter Gaps',
                platforms: [
                    { x: 0, y: 550, width: 800, height: 50 },
                    { x: 40, y: 480, width: 75, height: 20 },
                    { x: 200, y: 410, width: 75, height: 20 },
                    { x: 380, y: 340, width: 75, height: 20 },
                    { x: 80, y: 270, width: 75, height: 20 },
                    { x: 530, y: 210, width: 75, height: 20 },
                    { x: 280, y: 140, width: 75, height: 20 },
                    { x: 650, y: 70, width: 75, height: 20 },
                ],
                enemies: [
                    { x: 100, y: 530, speed: 4, minX: 30, maxX: 240 },
                    { x: 300, y: 460, speed: 4.5, minX: 180, maxX: 420 },
                    { x: 450, y: 390, speed: 4, minX: 350, maxX: 550 },
                    { x: 200, y: 320, speed: 4.5, minX: 60, maxX: 280 },
                    { x: 600, y: 260, speed: 4, minX: 500, maxX: 650 }
                ],
                goal: { x: 700, y: 20 }
            },
            {
                name: 'Level 7: Dodge Master',
                platforms: [
                    { x: 0, y: 550, width: 800, height: 50 },
                    { x: 30, y: 470, width: 70, height: 20 },
                    { x: 180, y: 410, width: 70, height: 20 },
                    { x: 360, y: 350, width: 70, height: 20 },
                    { x: 120, y: 280, width: 70, height: 20 },
                    { x: 510, y: 220, width: 70, height: 20 },
                    { x: 260, y: 150, width: 70, height: 20 },
                    { x: 650, y: 80, width: 70, height: 20 },
                ],
                enemies: [
                    { x: 100, y: 520, speed: 4.5, minX: 20, maxX: 250 },
                    { x: 250, y: 460, speed: 5, minX: 150, maxX: 380 },
                    { x: 420, y: 400, speed: 4.5, minX: 320, maxX: 540 },
                    { x: 150, y: 330, speed: 5, minX: 80, maxX: 300 },
                    { x: 580, y: 270, speed: 4.5, minX: 470, maxX: 680 },
                    { x: 350, y: 200, speed: 5, minX: 230, maxX: 430 }
                ],
                goal: { x: 700, y: 30 }
            },
            {
                name: 'Level 8: Expert Course',
                platforms: [
                    { x: 0, y: 550, width: 800, height: 50 },
                    { x: 25, y: 480, width: 65, height: 20 },
                    { x: 170, y: 420, width: 65, height: 20 },
                    { x: 340, y: 360, width: 65, height: 20 },
                    { x: 100, y: 290, width: 65, height: 20 },
                    { x: 490, y: 230, width: 65, height: 20 },
                    { x: 240, y: 160, width: 65, height: 20 },
                    { x: 620, y: 90, width: 65, height: 20 },
                ],
                enemies: [
                    { x: 80, y: 530, speed: 5, minX: 10, maxX: 250 },
                    { x: 230, y: 470, speed: 5.5, minX: 130, maxX: 380 },
                    { x: 400, y: 410, speed: 5, minX: 300, maxX: 540 },
                    { x: 130, y: 340, speed: 5.5, minX: 50, maxX: 280 },
                    { x: 560, y: 280, speed: 5, minX: 450, maxX: 650 },
                    { x: 320, y: 210, speed: 5.5, minX: 200, maxX: 450 },
                    { x: 550, y: 140, speed: 5, minX: 420, maxX: 680 }
                ],
                goal: { x: 700, y: 40 }
            },
            {
                name: 'Level 9: Extreme Challenge',
                platforms: [
                    { x: 0, y: 550, width: 800, height: 50 },
                    { x: 20, y: 490, width: 60, height: 20 },
                    { x: 160, y: 430, width: 60, height: 20 },
                    { x: 320, y: 370, width: 60, height: 20 },
                    { x: 90, y: 300, width: 60, height: 20 },
                    { x: 470, y: 240, width: 60, height: 20 },
                    { x: 220, y: 170, width: 60, height: 20 },
                    { x: 600, y: 100, width: 60, height: 20 },
                ],
                enemies: [
                    { x: 80, y: 540, speed: 5.5, minX: 10, maxX: 240 },
                    { x: 220, y: 480, speed: 6, minX: 120, maxX: 380 },
                    { x: 380, y: 420, speed: 5.5, minX: 280, maxX: 540 },
                    { x: 120, y: 350, speed: 6, minX: 40, maxX: 280 },
                    { x: 540, y: 290, speed: 5.5, minX: 430, maxX: 650 },
                    { x: 300, y: 220, speed: 6, minX: 180, maxX: 450 },
                    { x: 530, y: 150, speed: 5.5, minX: 400, maxX: 700 },
                    { x: 200, y: 100, speed: 6, minX: 100, maxX: 380 }
                ],
                goal: { x: 700, y: 50 }
            },
            {
                name: 'Level 10: ULTIMATE CHALLENGE!!!',
                platforms: [
                    { x: 0, y: 550, width: 800, height: 50 },
                    { x: 15, y: 500, width: 55, height: 20 },
                    { x: 150, y: 440, width: 55, height: 20 },
                    { x: 300, y: 380, width: 55, height: 20 },
                    { x: 80, y: 310, width: 55, height: 20 },
                    { x: 450, y: 250, width: 55, height: 20 },
                    { x: 200, y: 180, width: 55, height: 20 },
                    { x: 580, y: 110, width: 55, height: 20 },
                ],
                enemies: [
                    { x: 70, y: 550, speed: 6, minX: 5, maxX: 230 },
                    { x: 210, y: 490, speed: 6.5, minX: 110, maxX: 370 },
                    { x: 360, y: 430, speed: 6, minX: 260, maxX: 540 },
                    { x: 110, y: 360, speed: 6.5, minX: 30, maxX: 270 },
                    { x: 520, y: 300, speed: 6, minX: 410, maxX: 660 },
                    { x: 280, y: 230, speed: 6.5, minX: 160, maxX: 440 },
                    { x: 510, y: 160, speed: 6, minX: 380, maxX: 680 },
                    { x: 180, y: 110, speed: 6.5, minX: 80, maxX: 360 },
                    { x: 650, y: 60, speed: 6, minX: 550, maxX: 750 }
                ],
                goal: { x: 700, y: 60 }
            }
        ];

        let currentLevel = 0;

        const config = {
            type: Phaser.AUTO,
            parent: 'game-container',
            width: 800,
            height: 600,
            render: { 
                pixelArt: false,
                antialias: true
            },
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 300 },
                    debug: false
                }
            },
            scene: {
                create: create,
                update: update
            }
        };

        const game = new Phaser.Game(config);
        
        let player;
        let platformBodies = [];
        let enemies;
        let goal;
        let cursors;
        let canJump = true;
        let touchLeft = false;
        let touchRight = false;

        function create() {
            const level = levels[currentLevel];
            
            // Roblox-style sky (bright orange/yellow gradient)
            this.cameras.main.setBackgroundColor('#FFB347');
            const bg = this.add.graphics();
            bg.fillGradientStyle(0xFF8C00, 0xFF8C00, 0xFFD700, 0xFFD700, 1);
            bg.fillRect(0, 0, 800, 600);
            
            // Add some clouds (white rectangles)
            this.add.rectangle(150, 100, 150, 40, 0xFFFFFF);
            this.add.rectangle(500, 150, 120, 35, 0xFFFFFF);
            bg.depth = -1;
            
            // Player (RED SQUARE)
            player = this.add.rectangle(50, 500, 20, 30, 0xFF0000);
            this.physics.add.existing(player);
            player.body.setBounce(0);
            player.body.setDrag(0.5);
            player.body.setCollideWorldBounds(true);
            
            // Platforms (BRIGHT CYAN)
            platformBodies = [];
            level.platforms.forEach(p => {
                const platform = this.add.rectangle(p.x + p.width/2, p.y + p.height/2, p.width, p.height, 0x00FFFF);
                this.physics.add.existing(platform);
                platform.body.setImmovable(true);
                platform.body.setAllowGravity(false);
                platformBodies.push(platform);
                
                this.physics.add.collider(player, platform, () => {
                    canJump = true;
                });
            });
            
            // Goal (YELLOW STAR)
            goal = this.add.star(level.goal.x, level.goal.y, 5, 15, 25, 0xFFFF00);
            this.physics.add.existing(goal);
            goal.body.setAllowGravity(false);
            
            // Enemies (BRIGHT PURPLE)
            enemies = this.add.group();
            level.enemies.forEach(e => {
                const enemy = this.add.rectangle(e.x, e.y, 20, 20, 0x9D4EDD);
                this.physics.add.existing(enemy);
                enemy.body.setBounce(1);
                enemy.body.setVelocity(e.speed * 100, 0);
                enemy.minX = e.minX;
                enemy.maxX = e.maxX;
                enemy.speed = e.speed;
                enemies.add(enemy);
                
                platformBodies.forEach(platform => {
                    this.physics.add.collider(enemy, platform);
                });
                
                this.physics.add.overlap(player, enemy, () => {
                    currentLevel = 0;
                    this.scene.restart();
                });
            });
            
            // Win
            this.physics.add.overlap(player, goal, () => {
                if (currentLevel < levels.length - 1) {
                    currentLevel++;
                    this.scene.restart();
                } else {
                    this.add.text(400, 300, '🎉 YOU WON! 🎉', { fontSize: '40px', fill: '#FFFFFF' }).setOrigin(0.5);
                    this.physics.pause();
                }
            });
            
            // Input
            cursors = this.input.keyboard.createCursorKeys();
            const scene = this;
            
            const doJump = (pointer) => {
                // Don't jump if tapping on the movement buttons (bottom area)
                if (pointer && pointer.y > 500) return;
                
                if (canJump) {
                    player.body.setVelocityY(-330);
                    canJump = false;
                }
            };
            
            // Space bar or click/tap to jump
            this.input.keyboard.on('keydown-SPACE', doJump);
            this.input.on('pointerdown', doJump);
            
            // Level text
            this.add.text(10, 10, level.name, { fontSize: '16px', fill: '#FFFFFF', fontStyle: 'bold' });
            this.add.text(10, 40, 'Tap to Jump | Use Buttons to Move | Reach the Star!', { fontSize: '12px', fill: '#FFFFFF' });
            
            // Touch buttons for mobile (bright colors)
            const leftBtn = this.add.rectangle(60, 550, 80, 40, 0x00D9FF);
            const rightBtn = this.add.rectangle(740, 550, 80, 40, 0x00D9FF);
            leftBtn.setInteractive();
            rightBtn.setInteractive();
            
            this.add.text(60, 550, '◄', { fontSize: '30px', fill: '#FFFFFF' }).setOrigin(0.5, 0.5);
            this.add.text(740, 550, '►', { fontSize: '30px', fill: '#FFFFFF' }).setOrigin(0.5, 0.5);
            
            leftBtn.on('pointerdown', () => { touchLeft = true; });
            leftBtn.on('pointerup', () => { touchLeft = false; });
            leftBtn.on('pointerout', () => { touchLeft = false; });
            
            rightBtn.on('pointerdown', () => { touchRight = true; });
            rightBtn.on('pointerup', () => { touchRight = false; });
            rightBtn.on('pointerout', () => { touchRight = false; });
        }

        function update() {
            if (!player.body.touching.down) {
                canJump = false;
            }
            
            if (cursors.left.isDown || touchLeft) {
                player.body.setVelocityX(-160);
            } else if (cursors.right.isDown || touchRight) {
                player.body.setVelocityX(160);
            } else {
                player.body.setVelocityX(0);
            }
            
            enemies.children.entries.forEach(enemy => {
                if (enemy.x < enemy.minX) {
                    enemy.body.setVelocityX(enemy.speed * 100);
                } else if (enemy.x > enemy.maxX) {
                    enemy.body.setVelocityX(-enemy.speed * 100);
                }
            });
            
            if (player.y > 600) {
                currentLevel = 0;
                this.scene.restart();
            }
        }
    </script>
</body>
</html>
