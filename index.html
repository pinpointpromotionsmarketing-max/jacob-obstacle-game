                ],
                enemies: [
                    { x: 100, y: 530, speed: 4, minX: 30, maxX: 240 },
                    { x: 300, y: 460, speed: 4.5, minX: 180, maxX: 420 },
                    { x: 450, y: 390, speed: 4, minX: 350, maxX: 550 },
                    { x: 200, y: 320, speed: 4.5, minX: 60, maxX: 280 },
                    { x: 600, y: 260, speed: 4, minX: 500, maxX: 650 }

            },
            // Level 7
            {
                name: 'Level 7: Dodge Master',
                platforms: [
                    { x: 0, y: 550, width: 800, height: 50 },
                    { x: 30, y: 470, width: 70, height: 20 },
                    { x: 180, y: 410, width: 70, height: 20 },
                    { x: 360, y: 350, width: 70, height: 20 },
                    { x: 120, y: 280, width: 70, height: 20 },

                ],
                enemies: [
                    { x: 100, y: 520, speed: 4.5, minX: 20, maxX: 250 },
                    { x: 250, y: 460, speed: 5, minX: 150, maxX: 380 },
                    { x: 420, y: 400, speed: 4.5, minX: 320, maxX: 540 },

                    { x: 580, y: 270, speed: 4.5, minX: 470, maxX: 680 },

            // Level 8

                goal: { x: 700, y: 40 }

            // Level 9 - Super Hard
            {

                ],
                enemies: [
                    { x: 80, y: 540, speed: 5.5, minX: 10, maxX: 240 },
                    { x: 220, y: 480, speed: 6, minX: 120, maxX: 380 },
                    { x: 380, y: 420, speed: 5.5, minX: 280, maxX: 540 },
                    { x: 120, y: 350, speed: 6, minX: 40, maxX: 280 },
                    { x: 540, y: 290, speed: 5.5, minX: 430, maxX: 650 },
                    { x: 300, y: 220, speed: 6, minX: 180, maxX: 450 },
                    { x: 530, y: 150, speed: 5.5, minX: 400, maxX: 700 },

                ],
                goal: { x: 700, y: 50 }
            },
            // Level 10 - ULTIMATE CHALLENGE
            {
                name: 'Level 10: ULTIMATE CHALLENGE!!!',
                platforms: [
                    { x: 0, y: 550, width: 800, height: 50 },
                    { x: 15, y: 500, width: 55, height: 20 },
                    { x: 150, y: 440, width: 55, height: 20 },
                    { x: 300, y: 380, width: 55, height: 20 },
                    { x: 80, y: 310, width: 55, height: 20 },
                    { x: 450, y: 250, width: 55, height: 20 },
                    { x: 200, y: 180, width: 55, height: 20 },
                    { x: 580, y: 110, width: 55, height: 20 },
                ],
                enemies: [
                    { x: 70, y: 550, speed: 6, minX: 5, maxX: 230 },
                    { x: 210, y: 490, speed: 6.5, minX: 110, maxX: 370 },
                    { x: 360, y: 430, speed: 6, minX: 260, maxX: 540 },
                    { x: 110, y: 360, speed: 6.5, minX: 30, maxX: 270 },
                    { x: 520, y: 300, speed: 6, minX: 410, maxX: 660 },
                    { x: 280, y: 230, speed: 6.5, minX: 160, maxX: 440 },
                    { x: 510, y: 160, speed: 6, minX: 380, maxX: 680 },
                    { x: 180, y: 110, speed: 6.5, minX: 80, maxX: 360 },
                    { x: 650, y: 60, speed: 6, minX: 550, maxX: 750 }
                ],
                goal: { x: 700, y: 60 }
            }
        ];

        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 300 },
                    debug: false
                }
            },
            scene: {
                create: create,
                update: update
            }
        };

        const game = new Phaser.Game(config);
        
        let currentLevel = 0;
        let player;
        let platforms;
        let enemies;
        let goal;
        let cursors;
        let levelText;
        let instructionText;

        function create() {
            loadLevel(currentLevel);
        }

        function loadLevel(levelIndex) {
            // Clear old physics objects
            if (this.physics) {
                this.physics.world.colliders.getActive().forEach(collider => collider.destroy());
            }

            const level = levels[levelIndex];
            
            // Background
            this.cameras.main.setBackgroundColor('#87CEEB');

            // Create player
            player = this.add.rectangle(50, 500, 20, 30, 0xFF0000);
            this.physics.add.existing(player);
            player.body.setBounce(0.2);
            player.body.setCollideWorldBounds(true);
            player.body.onWorldBounds = true;

            // Create platforms
            platforms = this.physics.add.staticGroup();
            level.platforms.forEach(p => {
                platforms.create(p.x + p.width/2, p.y, null).setScale(p.width/10, p.height/10).setOrigin(0.5, 0.5).refreshBody();
                this.add.rectangle(p.x + p.width/2, p.y + p.height/2, p.width, p.height, 0x00AA00);
            });

            // Create goal
            goal = this.add.star(level.goal.x, level.goal.y, 5, 15, 25, 0xFFFF00);
            this.physics.add.existing(goal);
            goal.body.setAllowGravity(false);

            // Create enemies
            enemies = this.add.group();
            level.enemies.forEach(e => {
                const enemy = this.add.rectangle(e.x, e.y, 20, 20, 0xFF6600);
                this.physics.add.existing(enemy);
                enemy.body.setBounce(1);
                enemy.body.setVelocity(e.speed * 100, 0);
                enemy.minX = e.minX;
                enemy.maxX = e.maxX;
                enemy.speed = e.speed;
                enemies.add(enemy);
            });

            // Colliders
            this.physics.add.collider(player, platforms);
            this.physics.add.collider(enemies, platforms);
            
            // Win condition
            this.physics.add.overlap(player, goal, () => {
                if (currentLevel < levels.length - 1) {
                    currentLevel++;
                    this.scene.restart();
                } else {
                    this.add.text(400, 300, '🎉 YOU WON! 🎉', { fontSize: '40px', fill: '#000000' }).setOrigin(0.5);
                    this.physics.pause();
                }
            });

            // Lose condition (touch enemy)
            this.physics.add.overlap(player, enemies, () => {
                this.scene.restart();
            });

            // Jump when touching ground
            cursors = this.input.keyboard.createCursorKeys();
            
            // UI
            levelText = this.add.text(10, 10, level.name, { fontSize: '16px', fill: '#000000', backgroundColor: '#FFFFFF', padding: { x: 5, y: 5 } });
            instructionText = this.add.text(10, 40, 'Arrow Keys: Move | Space: Jump | Reach the STAR!', { fontSize: '12px', fill: '#000000', backgroundColor: '#FFFFFF', padding: { x: 5, y: 5 } });
        }

        function update() {
            // Player movement
            if (cursors.left.isDown) {
                player.body.setVelocityX(-160);
            } else if (cursors.right.isDown) {
                player.body.setVelocityX(160);
            } else {
                player.body.setVelocityX(0);
            }

            // Jump
            if (cursors.space.isDown && player.body.touching.down) {
                player.body.setVelocityY(-330);
            }

            // Enemy AI - bounce between min/max X
            enemies.children.entries.forEach(enemy => {
                if (enemy.x < enemy.minX) {
                    enemy.body.setVelocityX(enemy.speed * 100);
                } else if (enemy.x > enemy.maxX) {
                    enemy.body.setVelocityX(-enemy.speed * 100);
                }
            });

            // Fall off bottom = die
            if (player.y > 600) {
                this.scene.restart();
            }
        }
    </script>
</body>
</html>
